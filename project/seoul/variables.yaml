account_id: "511874874257"
region: "ap-northeast-2"
region_name: "seoul"
cidr_block: "10.2.0.0/16"
count_of_public_subnets: 2
count_of_private_subnets: 2
subnet_bit: 8
count_of_az: 2
create_nat_gw: false
iam_role_name: "role-ec2-access-s3"

domainname: "ksg.it-edu.org"
hostname: "www"

s3_subname: "test-board"
sg_map:
  icmp:
    description: "ICMP Echo Requests"
    ingress_rules:
      echo:
        protocol: "icmp"
        from_port: 8
        to_port: 0
        cidr_blocks: 
          - 0.0.0.0/0
    egress_rules: {}
  remote:
    description: " Remote Access - Only Company"
    ingress_rules:
      ssh:
        protocol: "tcp"
        from_port: 22
        to_port: 22
        cidr_blocks: 
          - 183.98.32.210/32
    egress_rules: {}
  web:
    description: "Web Traffics - AnyWhere"
    ingress_rules:
      http:
        protocol: "tcp"
        from_port: 80
        to_port: 80
        cidr_blocks: 
          - 0.0.0.0/0
    egress_rules: {}
  cache:
    description: "Cache Server - Only Company"
    ingress_rules:
      redis:
        protocol: "tcp"
        from_port: 6379
        to_port: 6379
        cidr_blocks: 
          - "10.2.0.0/16"
    egress_rules: {}
  db:
    description: "DataBase Server - Only Company"
    ingress_rules:
      mysql:
        protocol: "tcp"
        from_port: 3306
        to_port: 3306
        cidr_blocks: 
          - "10.2.0.0/16"
    egress_rules: {}
  out:
    description: "Outbound Traffics - all"
    ingress_rules: {}
    egress_rules:
      all:
        protocol: "-1"
        from_port: 0
        to_port: 0
        cidr_blocks: 
          - "0.0.0.0/0"
  lb:
    description: "for LoadBalancer"
    ingress_rules:
      http:
        protocol: "tcp"
        from_port: 80
        to_port: 80
        cidr_blocks: 
          - "0.0.0.0/0"
      https:
        protocol: "tcp"
        from_port: 443
        to_port: 443
        cidr_blocks: 
          - 0.0.0.0/0
    egress_rules: 
      http:
        protocol: "tcp"
        from_port: 80
        to_port: 80
        cidr_blocks:
          - "10.2.0.0/16"
algorithm: "ED25519"
db_subnet_group: "test board"
db_parameter_group:
  name: "test-board"
  family: "mariadb10.11"
  parameters:
    time_zone: "Asia/Seoul"
    character_set_database: "utf8mb4"

rds_mariadb:
    engine: "mariadb"
    engine_version: "10.11.16"
    identifier: "database-board"
    username: "root"
    password: "kang47290!"
    instance_class: "db.t3.micro"
    storage_type: "gp2"
    allocated_storage: 20
    multi_az: false
    network_type: "IPV4"
    publicly_accessible: false
    skip_final_snapshot: true
    deletion_protection: false
    sg_names:
      - db
database:
  db_name: "test_board"
  hostname: "%"
  username: "webmaster"
  password: "123"
lambda:
  function_name: "db_init"
  runtime: "python3.14"
  role: "arn:aws:iam::511874874257:role/role-lambda-access-vpc"
  handler: "lambda_function.lambda_handler"
  vpc_config:
     sg_names: ["out"]
lt_web:
  name: ec2-temp-web
  description: "web server - test board"
  image_id: "ami-0d4c056a16f3ae150"
  instance_type: "t3.micro"
  sg_names:
    - icmp
    - remote
    - web
    - out


web_app_file: "test_board.tar.gz"
file_map:
  web_script:
    key: "web_script.sh"
  www_conf:
    key: "www.conf"
  config_php:
    key: "config.php"
cache_valkey:
  engine: "valkey"
  major_engine_version: "7"
  name: "cache-test-board"
  description: "Test Board Cache Server"
  sg_names:
    - cache
  cache_usage_limits:
    data_storage:
      minimum: 1
      maximum: 10
      unit: "GB"
    ecpu_per_second:
      minimum: 1000
      maximum: 2000
web:
  count: 2
  sg_names:
    - icmp
    - remote
    - web
    - out
tg_web:
  description: "타겟 그룹"
  name: "tg-webserver"
  port: 80
  protocol: "HTTP"
  protocol_version: "HTTP1"
  ip_address_type: "ipv4"
  target_type: "instance"
  health_check:
    path: "/"
    protocol: "HTTP"
    port: "traffic-port"
    healthy_threshold: 3
    unhealthy_threshold: 3
    timeout: 2
    interval: 5
    matcher: "200-299"